name = "agentgram-tracker"
main = "index.ts"
compatibility_date = "2024-01-01"
workers_dev = true

# Create the KV namespace first:
#   npx wrangler kv namespace create DOWNLOAD_COUNTS
# Then replace the id below with the output id.

[[kv_namespaces]]
binding = "DOWNLOAD_COUNTS"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
